<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hidabroot Production Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#E8F5EE;
  --card:#ffffff;
  --dark:#1C3A2E;
  --dark2:#2A5540;
  --accent:#2AB86A;
  --accent2:#7EEABC;
  --accent-soft:rgba(42,184,106,.15);
  --border:#C8E8D5;
  --border2:rgba(28,58,46,.15);
  --text:#1C3A2E;
  --muted:#5A7A68;
  --faint:rgba(28,58,46,.05);
  --red:#DC3545;
  --red-soft:rgba(220,53,69,.12);
  --yellow:#C9A227;
  --yellow-soft:rgba(201,162,39,.12);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;font-size:14;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

#app{min-height:100vh;display:flex;flex-direction:column;}
#main{max-width:1300px;margin:0 auto;padding:14px;flex:1;width:100%;}

/* Header */
header{background:var(--dark);border-bottom:1px solid var(--dark2);padding:10px 18px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:18px;font-weight:900;color:var(--accent2);letter-spacing:-.5px;}
.logo span{color:#fff;}
.sync{font-size:11;color:rgba(126,234,188,.5);padding:3px 10px;
  border:1px solid rgba(126,234,188,.2);border-radius:20px;display:none;}
.sync.saving{color:var(--accent2);border-color:rgba(126,234,188,.4);display:block;}
.sync.saved{color:var(--accent2);border-color:rgba(126,234,188,.4);display:block;}

/* TabBar */
#tabbar{display:flex;gap:3px;padding:8px 14px 0;background:var(--bg);
  border-bottom:1px solid var(--border);overflow-x:auto;}
.tb{display:flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid transparent;
  border-radius:10px 10px 0 0;border-bottom:none;cursor:pointer;
  font-family:'Heebo',sans-serif;font-size:12;font-weight:700;
  white-space:nowrap;background:transparent;color:var(--muted);transition:all .15s;}
.tb:hover{background:rgba(42,184,106,.1);color:var(--dark);}
.tb.active{background:#fff;border-color:var(--border);color:var(--dark);border-bottom-color:#fff;}

/* Hero */
.hero{margin-bottom:16px;padding:14px 16px;background:var(--dark);
  border-radius:16px;display:flex;align-items:center;gap:12px;}
.hero-icon{font-size:26px;line-height:1;}
.hero-title{font-size:17px;font-weight:900;color:#fff;}
.hero-sub{font-size:11;color:var(--accent2);opacity:.7;margin-top:2px;font-weight:400;}

/* Card headers */
.ch{border-radius:12px 12px 0 0;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.ch.nc{cursor:default;}
.cb{background:#fff;border-radius:0 0 12px 12px;overflow:hidden;}

/* All section headers use the same dark style */
.gold-h,.purple-h,.green-h,.teal-h,.red-h{background:var(--dark);border:1px solid var(--dark2);}
.gold-b,.purple-b,.green-b,.teal-b,.red-b{border:1px solid var(--border);border-top:none;}
.gold-t,.purple-t,.green-t,.teal-t,.red-t{color:var(--accent2);font-weight:800;font-size:13;}

/* Rows */
.cr{display:flex;align-items:center;gap:8px;padding:9px 14px;
  border-bottom:1px solid var(--border);flex-wrap:wrap;}
.cr:last-child{border-bottom:none;}
.cr:hover{background:var(--faint);}
.cr-btns{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:4px;cursor:pointer;border:1px solid;
  border-radius:7px;font-family:'Heebo',sans-serif;font-weight:700;transition:all .14s;
  white-space:nowrap;background:transparent;}
.btn-ghost{border-color:var(--border2);color:var(--muted);font-size:11;padding:3px 8px;}
.btn-ghost:hover{color:var(--dark);background:var(--faint);}
.btn-air{background:rgba(28,58,46,.12);border-color:var(--border2);color:var(--dark);font-size:11;padding:4px 10px;}
.btn-air:hover{background:rgba(28,58,46,.2);}
.btn-post{background:rgba(42,184,106,.15);border-color:rgba(42,184,106,.4);color:#1A6B42;font-size:11;padding:4px 10px;}
.btn-post:hover{background:rgba(42,184,106,.28);}
.btn-del{background:transparent;border:none;color:rgba(220,53,69,.4);font-size:12;padding:2px 4px;cursor:pointer;}
.btn-del:hover{color:var(--red);}
.btn-add{background:rgba(42,184,106,.15);border-color:rgba(42,184,106,.4);color:#1A6B42;font-size:12;padding:5px 14px;}
.btn-add:hover{background:rgba(42,184,106,.28);}
.btn-finish{background:rgba(42,184,106,.12);border-color:rgba(42,184,106,.35);color:#1A6B42;font-size:11;padding:4px 10px;}
.btn-finish:hover{background:rgba(42,184,106,.25);}

/* Inputs */
input[type=text],input[type=date],input[type=time],textarea,select{
  background:#fff;border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-family:'Heebo',sans-serif;font-size:12;
  padding:5px 8px;outline:none;transition:border-color .15s;direction:rtl;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
input[type=date]{width:118px;} input[type=time]{width:68px;}

/* Table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:10;font-weight:700;color:var(--muted);padding:6px 12px;
  text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--faint);}
.tbl td{padding:8px 12px;font-size:13;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--faint);}
.tbl td.c{text-align:center;}
.edit-cell{cursor:pointer;} .edit-cell:hover{color:var(--accent);}
.inline-ed{background:rgba(42,184,106,.08);border:1px solid rgba(42,184,106,.4) !important;color:#1A6B42 !important;}

/* Stage pipeline */
.stage-row{display:flex;align-items:center;gap:10px;padding:6px 10px;
  border-radius:8px;transition:background .1s;margin-bottom:4px;}
.stage-row.done{background:rgba(42,184,106,.08);}
.stage-chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);
  background:transparent;color:transparent;font-size:9;font-weight:bold;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .15s;font-family:'Heebo',sans-serif;}
.stage-chk.done{background:var(--accent);border-color:var(--accent);color:#fff;}
.stage-lbl{font-size:12;flex:1;color:var(--muted);transition:color .15s;}
.stage-lbl.done{color:var(--dark);font-weight:600;}
.sdots{display:flex;gap:3px;align-items:center;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .15s;}
.sdot.done{background:var(--accent);}

/* Dots */
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dg{background:var(--accent);} .dp{background:#5A7A68;} .dgr{background:var(--accent);}
.dgray{background:#aaa;} .ddim{background:var(--border);} .dyel{background:var(--yellow);}
.dt{background:var(--dark);} .dot-red{background:var(--red);} .dot-yellow{background:var(--yellow);}

/* Badges */
.badge{font-size:10;font-weight:700;padding:2px 7px;border-radius:10px;border:1px solid;}
.ba{background:rgba(42,184,106,.15);border-color:rgba(42,184,106,.3);color:#1A6B42;}
.bp{background:rgba(201,162,39,.15);border-color:rgba(201,162,39,.3);color:#7A5E10;}
.bd{background:rgba(100,100,100,.1);border-color:rgba(100,100,100,.2);color:#5A7A68;}
.bl{background:rgba(28,58,46,.1);border-color:var(--border2);color:var(--dark);}

/* Producers */
.pcard{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.pav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:900;font-size:16px;flex-shrink:0;}
.av0{background:rgba(42,184,106,.2);color:#1A6B42;}
.av1{background:rgba(28,58,46,.15);color:var(--dark);}
.av2{background:rgba(126,234,188,.3);color:#1C3A2E;}

.sec-box{margin-bottom:16px;}

/* Pill sub-tabs */
.ptabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.ptab{padding:5px 14px;border:1px solid var(--border);border-radius:20px;
  cursor:pointer;font-size:12;font-weight:600;color:var(--muted);
  background:#fff;font-family:'Heebo',sans-serif;transition:all .15s;}
.ptab:hover{background:var(--faint);color:var(--dark);}
.ptab.active{background:var(--dark);border-color:var(--dark);color:var(--accent2);}

.arr{font-size:10;color:var(--muted);margin-right:4px;}
.empty{padding:32px;text-align:center;color:var(--muted);font-size:13;font-style:italic;}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--dark);border:1px solid var(--accent);
  color:var(--accent2);padding:10px 20px;border-radius:10px;
  font-size:13;font-weight:600;transition:transform .3s;z-index:999;}
#toast.show{transform:translateX(-50%) translateY(0);}

/* Modal */
#moverlay{display:none;position:fixed;inset:0;background:rgba(28,58,46,.4);
  backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;}
#moverlay.open{display:flex;}
#mbox{background:#fff;border:1px solid var(--border);border-radius:16px;
  padding:20px;max-width:480px;width:calc(100% - 32px);max-height:80vh;overflow-y:auto;}
.mclose{float:left;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;}
.mrow{margin-bottom:12px;}
.mlbl{font-size:12;color:var(--muted);margin-bottom:4px;}
.mrow input,.mrow select{width:100%;padding:7px 10px;}

@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.tab-content>*{animation:fi .18s ease;}

/* Task status popup */
#status-overlay{display:none;position:fixed;inset:0;background:rgba(28,58,46,.5);
  backdrop-filter:blur(5px);z-index:300;align-items:center;justify-content:center;}
#status-overlay.open{display:flex;}
#status-box{background:#fff;border:1px solid var(--border);border-radius:18px;
  padding:24px;width:420px;max-width:calc(100% - 32px);}
#status-box h3{font-size:15px;font-weight:800;color:var(--dark);margin-bottom:4px;}
#status-box .stask-name{font-size:12;color:var(--muted);margin-bottom:14px;}
#status-box textarea{width:100%;height:130px;resize:vertical;
  background:var(--faint);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:'Heebo',sans-serif;
  font-size:13;padding:10px 12px;outline:none;line-height:1.6;}
#status-box textarea:focus{border-color:var(--accent);}
.status-footer{display:flex;justify-content:flex-start;gap:8px;margin-top:12px;}
.btn-save-status{background:var(--dark);border:1px solid var(--dark2);
  color:var(--accent2);font-size:13;font-weight:700;padding:7px 18px;
  border-radius:8px;cursor:pointer;font-family:'Heebo',sans-serif;}
.btn-save-status:hover{background:var(--dark2);}
.btn-cancel-status{background:transparent;border:1px solid var(--border);
  color:var(--muted);font-size:13;font-weight:600;padding:7px 14px;
  border-radius:8px;cursor:pointer;font-family:'Heebo',sans-serif;}
.btn-cancel-status:hover{color:var(--dark);}
.status-preview{font-size:11;color:var(--accent);margin-top:3px;
  white-space:pre-wrap;line-height:1.5;max-height:36px;overflow:hidden;}

/* Form upload button */
.btn-form{background:rgba(28,58,46,.1);border-color:var(--border2);
  color:var(--dark);font-size:11;padding:4px 10px;}
.btn-form:hover{background:rgba(28,58,46,.18);}
.btn-form.uploaded{background:rgba(42,184,106,.15);border-color:rgba(42,184,106,.4);color:#1A6B42;}

/* Production Form Popup */
#prod-form-overlay{display:none;position:fixed;inset:0;background:rgba(28,58,46,.5);
  backdrop-filter:blur(7px);z-index:500;align-items:flex-start;
  justify-content:center;padding:20px 16px;overflow-y:auto;}
#prod-form-overlay.open{display:flex;}
#prod-form-box{background:#fff;border:1px solid var(--border);border-radius:20px;
  padding:28px;width:600px;max-width:100%;margin:auto;}
.pf-title{font-size:17px;font-weight:900;color:var(--dark);margin-bottom:4px;}
.pf-sub{font-size:12;color:var(--muted);margin-bottom:20px;}
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.pf-full{grid-column:1/-1;}
.pf-field label{display:block;font-size:11;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.pf-field input,.pf-field textarea,.pf-field select{width:100%;
  background:var(--faint);border:1px solid var(--border);
  border-radius:9px;color:var(--text);font-family:'Heebo',sans-serif;
  font-size:13;padding:8px 11px;outline:none;transition:border-color .15s;resize:vertical;}
.pf-field input:focus,.pf-field textarea:focus{border-color:var(--accent);}
.pf-field textarea{height:72px;line-height:1.55;}
.pf-footer{display:flex;gap:8px;margin-top:20px;align-items:center;}
.btn-pf-save{background:var(--dark);border:1px solid var(--dark2);
  color:var(--accent2);font-size:13;font-weight:700;padding:8px 22px;
  border-radius:9px;cursor:pointer;font-family:'Heebo',sans-serif;}
.btn-pf-save:hover{background:var(--dark2);}
.btn-pf-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);
  font-size:13;font-weight:600;padding:8px 16px;border-radius:9px;
  cursor:pointer;font-family:'Heebo',sans-serif;}
.btn-pf-cancel:hover{color:var(--dark);}
.btn-pdf{background:rgba(220,53,69,.1);border:1px solid rgba(220,53,69,.3);
  color:var(--red);font-size:11;padding:4px 10px;border-radius:7px;
  cursor:pointer;font-family:'Heebo',sans-serif;font-weight:700;}
.btn-pdf:hover{background:rgba(220,53,69,.2);}

/* Show details popup */
#show-overlay{display:none;position:fixed;inset:0;background:rgba(28,58,46,.5);
  backdrop-filter:blur(6px);z-index:400;align-items:flex-start;
  justify-content:center;padding:24px 16px;overflow-y:auto;}
#show-overlay.open{display:flex;}
#show-box{background:#fff;border:1px solid var(--border);border-radius:20px;
  padding:28px;width:560px;max-width:100%;margin:auto;}
#show-box .sh-title{font-size:18px;font-weight:900;color:var(--dark);margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;}
#show-box .sh-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;}
#show-box .sh-close:hover{color:var(--dark);}
.sh-field{margin-bottom:16px;}
.sh-label{font-size:11;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:6px;}
.sh-field textarea,.sh-field input[type=text]{width:100%;background:var(--faint);
  border:1px solid var(--border);border-radius:10px;color:var(--text);
  font-family:'Heebo',sans-serif;font-size:13;padding:9px 12px;
  outline:none;line-height:1.6;resize:vertical;}
.sh-field textarea:focus,.sh-field input[type=text]:focus{border-color:var(--accent);}
.sh-field textarea{height:80px;}
.sh-divider{border:none;border-top:1px solid var(--border);margin:18px 0;}
.sh-upload-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.btn-upload-tachkir{background:rgba(28,58,46,.1);border:1px solid var(--border2);
  color:var(--dark);font-size:12;font-weight:700;padding:6px 14px;
  border-radius:8px;cursor:pointer;font-family:'Heebo',sans-serif;}
.btn-upload-tachkir:hover{background:rgba(28,58,46,.18);}
.btn-upload-tachkir.has-file{background:rgba(42,184,106,.15);border-color:rgba(42,184,106,.4);color:#1A6B42;}
.sh-footer{display:flex;gap:8px;margin-top:20px;}
.btn-sh-save{background:var(--dark);border:1px solid var(--dark2);
  color:var(--accent2);font-size:13;font-weight:700;padding:8px 22px;
  border-radius:9px;cursor:pointer;font-family:'Heebo',sans-serif;}
.btn-sh-save:hover{background:var(--dark2);}
.btn-sh-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);
  font-size:13;font-weight:600;padding:8px 16px;border-radius:9px;
  cursor:pointer;font-family:'Heebo',sans-serif;}
.btn-sh-cancel:hover{color:var(--dark);}
.name-clickable{cursor:pointer;color:var(--text);}
.name-clickable:hover{color:var(--accent);text-decoration:underline;text-underline-offset:3px;}

/* Layout */
#app{min-height:100vh;display:flex;flex-direction:column;}
#main{max-width:1300px;margin:0 auto;padding:14px;flex:1;width:100%;}

/* Header */
header{background:rgba(4,8,18,0.88);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:10px 18px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;}
.logo{font-size:18px;font-weight:900;color:var(--gold);letter-spacing:-.5px;}
/* Editable titles */
.editable-title{cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .15s;}
.editable-title:hover{border-bottom-color:rgba(42,184,106,.5);}
.pencil-btn{font-size:11;cursor:pointer;opacity:0;transition:opacity .15s;
  padding:1px 4px;border-radius:4px;user-select:none;}
*:hover>.pencil-btn,.pencil-btn:hover{opacity:1;}
th .pencil-btn{opacity:0.4;}
th:hover .pencil-btn{opacity:1;}
.title-input{background:rgba(42,184,106,.08);border:1px solid rgba(42,184,106,.4) !important;
  color:#1A6B42 !important;font-weight:800;font-size:13;padding:2px 6px !important;
  border-radius:5px;min-width:120px;font-family:'Heebo',sans-serif;outline:none;}
.tab-title-input{background:rgba(126,234,188,.15);border:1px solid rgba(126,234,188,.4);
  color:var(--accent2);font-weight:700;font-size:12;padding:2px 8px;border-radius:6px;
  font-family:'Heebo',sans-serif;outline:none;min-width:60px;}

/* Status popup */
#status-overlay{display:none;position:fixed;inset:0;background:rgba(28,58,46,.5);
  backdrop-filter:blur(5px);z-index:300;align-items:center;justify-content:center;}
#status-overlay.open{display:flex;}
#status-box{background:#fff;border:1px solid var(--border);border-radius:18px;
  padding:24px;width:420px;max-width:calc(100% - 32px);}

/* Show overlay / prod form overlay already defined above */
#show-overlay{display:none;position:fixed;inset:0;background:rgba(28,58,46,.5);
  backdrop-filter:blur(6px);z-index:400;align-items:flex-start;
  justify-content:center;padding:24px 16px;overflow-y:auto;}
#show-overlay.open{display:flex;}

/* ── Calendar / Diary ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding:0 2px;}
.cal-month-title{font-size:17px;font-weight:900;color:var(--dark);}
.cal-nav-btn{background:var(--dark);color:var(--accent2);border:none;
  border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13;
  font-weight:700;font-family:'Heebo',sans-serif;}
.cal-nav-btn:hover{background:var(--dark2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-size:11;font-weight:700;color:var(--muted);
  padding:4px 0;border-bottom:2px solid var(--border);margin-bottom:2px;}
.cal-day{min-height:88px;background:#fff;border:1px solid var(--border);
  border-radius:8px;padding:5px 6px;cursor:pointer;transition:all .14s;
  position:relative;overflow:hidden;}
.cal-day:hover{border-color:var(--accent);background:rgba(42,184,106,.03);}
.cal-day.today{border-color:var(--accent);border-width:2px;}
.cal-day.other-month{background:var(--faint);opacity:.55;}
.cal-day.other-month .cal-day-num{color:var(--muted);}
.cal-day-num{font-size:12;font-weight:700;color:var(--dark);margin-bottom:3px;}
.cal-day.today .cal-day-num{
  background:var(--dark);color:var(--accent2);
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:11;}
.cal-event{font-size:10;font-weight:600;padding:2px 5px;border-radius:4px;
  margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;background:var(--dark);color:var(--accent2);}
.cal-event:nth-child(3n+2){background:rgba(42,184,106,.2);color:#1A6B42;}
.cal-event:nth-child(3n+3){background:rgba(201,162,39,.18);color:#7A5E10;}
.cal-heb-date{font-size:9;color:var(--muted);margin-bottom:2px;font-weight:500;}
.cal-holiday{font-size:9;color:#B03020;font-weight:700;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-parsha{font-size:9;color:#1A5C42;font-weight:600;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;}
.cal-day.has-holiday{background:rgba(176,48,32,.04);border-color:rgba(176,48,32,.2);}
.cal-day.shabat{background:rgba(42,184,106,.03);border-color:rgba(42,184,106,.2);}
.cal-day.shabat .cal-day-num{color:#1A6B42;}
  border-radius:50%;background:var(--faint);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:12;
  cursor:pointer;opacity:0;transition:opacity .15s;color:var(--accent);}
.cal-day:hover .cal-add-btn{opacity:1;}

/* Event popup */
#ev-overlay{display:none;position:fixed;inset:0;background:rgba(28,58,46,.45);
  backdrop-filter:blur(5px);z-index:600;align-items:center;justify-content:center;}
#ev-overlay.open{display:flex;}
#ev-box{background:#fff;border:1px solid var(--border);border-radius:18px;
  padding:24px;width:400px;max-width:calc(100% - 32px);}
#ev-box h3{font-size:15px;font-weight:900;color:var(--dark);margin-bottom:4px;}
#ev-date-lbl{font-size:12;color:var(--muted);margin-bottom:16px;}
.ev-field{margin-bottom:12px;}
.ev-field label{display:block;font-size:11;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.ev-field input,.ev-field textarea{width:100%;background:var(--faint);
  border:1px solid var(--border);border-radius:8px;color:var(--text);
  font-family:'Heebo',sans-serif;font-size:13;padding:7px 10px;outline:none;}
.ev-field input:focus,.ev-field textarea:focus{border-color:var(--accent);}
.ev-field textarea{height:60px;resize:vertical;}
.ev-time-row{display:flex;gap:10px;}
.ev-time-row .ev-field{flex:1;}
.ev-footer{display:flex;gap:8px;margin-top:16px;}
.btn-ev-save{background:var(--dark);border:1px solid var(--dark2);color:var(--accent2);
  font-size:13;font-weight:700;padding:8px 20px;border-radius:9px;
  cursor:pointer;font-family:'Heebo',sans-serif;}
.btn-ev-save:hover{background:var(--dark2);}
.btn-ev-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);
  font-size:13;font-weight:600;padding:8px 14px;border-radius:9px;
  cursor:pointer;font-family:'Heebo',sans-serif;}
.btn-ev-cancel:hover{color:var(--dark);}
.btn-ev-del{background:rgba(220,53,69,.08);border:1px solid rgba(220,53,69,.3);
  color:var(--red);font-size:13;font-weight:600;padding:8px 14px;
  border-radius:9px;cursor:pointer;font-family:'Heebo',sans-serif;margin-right:auto;}
.btn-ev-del:hover{background:rgba(220,53,69,.18);}

@media(max-width:640px){
  .cal-day{min-height:54px;padding:3px 4px;}
  .cal-event{font-size:9;padding:1px 3px;}
  .cal-dow{font-size:10;}
  .cal-month-title{font-size:14;}
  #ev-box{padding:18px;}
}
@media (max-width: 640px) {

  /* Main padding tighter */
  #main{padding:10px 10px;}

  /* Header */
  header{padding:8px 12px;}
  .logo{font-size:15px;}

  /* Tab bar — scrollable, compact */
  #tabbar{padding:6px 8px 0;gap:2px;}
  .tb{font-size:11;padding:6px 10px;}

  /* Hero smaller */
  .hero{padding:12px;margin-bottom:12px;}
  .hero-icon{font-size:22px;}
  .hero-title{font-size:15px;}

  /* Card rows — stack buttons below content */
  .cr{flex-wrap:wrap;gap:6px;padding:10px 12px;}

  /* Name takes full width, buttons wrap below */
  .cr > div[style*="flex:1"],
  .cr > .dot ~ div{flex-basis:100%;}

  /* Button group in rows — full width, wrap */
  .cr > td[style*="white-space"],
  .cr > span,
  .cr > button,
  .cr > input[type=text],
  .cr > input[type=date],
  .cr > input[type=time]{
    flex-shrink:0;
  }

  /* Table: make it card-like on mobile */
  .tbl, .tbl thead, .tbl tbody, .tbl th, .tbl td, .tbl tr {
    display: block;
  }
  .tbl thead{display:none;}
  .tbl tr{
    background:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    margin-bottom:8px;
    padding:10px 12px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    align-items:center;
  }
  .tbl td{
    border:none;
    padding:2px 0;
    font-size:13;
    border-bottom:none !important;
  }
  /* Name cell full width */
  .tbl td:first-child{
    flex-basis:100%;
    font-weight:700;
    font-size:13;
  }
  /* Buttons cell full width */
  .tbl td:last-child{
    flex-basis:100%;
    display:flex !important;
    flex-wrap:wrap;
    gap:5px;
    padding-top:4px;
    border-top:1px solid var(--border) !important;
    margin-top:4px;
  }
  .tbl tr:hover td{background:transparent;}

  /* Production form popup — full width */
  #prod-form-box{padding:18px;width:100%;border-radius:14px;}
  .pf-grid{grid-template-columns:1fr;}
  .pf-full{grid-column:1;}

  /* Show popup full width */
  #show-box{padding:18px;width:100%;border-radius:14px;}

  /* Status popup full width */
  #status-box{padding:18px;}

  /* Post tab episode rows */
  .cr > input[type=date]{width:100%;}

  /* OnAir rows */
  .cr > input[type=date],
  .cr > input[type=time]{
    flex:1;min-width:90px;
  }

  /* Pill sub-tabs */
  .ptabs{gap:4px;}
  .ptab{font-size:11;padding:4px 10px;}

  /* Section header buttons smaller */
  .ch{padding:9px 12px;}
  .gold-t,.purple-t,.green-t,.teal-t,.red-t{font-size:12;}

  /* Inputs in rows full width on mobile */
  .cr > input[type=text]{width:100%;}

  /* Producer cards */
  .pcard{padding:12px;}
}

@media (max-width: 400px) {
  .tb{font-size:10;padding:5px 8px;}
  .logo{font-size:13;}
  #main{padding:8px;}
}
</style>
</head>

<div id="app">
  <header>
    <div class="logo">HIDABROOT <span>HUB</span></div>
    <div id="sync" class="sync"></div>
  </header>
  <div id="tabbar"></div>
  <div id="main"><div id="tab-content" class="tab-content"></div></div>
</div>
<div id="toast"></div>
<div id="moverlay"><div id="mbox"></div></div>

<!-- Task Status Popup -->
<div id="status-overlay">

    <textarea id="status-textarea" placeholder="כתבי כאן עדכון התקדמות, הערות, שלב נוכחי..."></textarea>
    <div class="status-footer">
      <button class="btn-save-status" onclick="saveTaskStatus()">שמור</button>
      <button class="btn-cancel-status" onclick="closeStatusPopup()">ביטול</button>
    </div>
  </div>
</div>

<!-- Production Form Popup -->
<div id="prod-form-overlay">

    <div id="pf-prog-name" class="pf-sub"></div>
    <div class="pf-grid">

      <div class="pf-field pf-full">
        <label>1. שם התכנית</label>
        <input id="pf-check" type="text" placeholder="שם התכנית..." />
      </div>

      <div class="pf-field pf-full">
        <label>2. כותרות לתכנית <span style="font-weight:400;font-size:10">(אם צולם יותר מפרק אחד — כותרת לכל פרק)</span></label>
        <textarea id="pf-titles" placeholder="פרק 1: ...&#10;פרק 2: ...&#10;פרק 3: ..." style="height:88px"></textarea>
      </div>

      <div class="pf-field">
        <label>3. תאריך צילום</label>
        <input id="pf-shoot-date" type="date" />
      </div>

      <div class="pf-field">
        <label>4. הפקה ותחקיר</label>
        <input id="pf-producer" type="text" placeholder="שם המפיק/ה והתחקירן/ית" />
      </div>

      <div class="pf-field">
        <label>5. בימוי</label>
        <input id="pf-director" type="text" placeholder="שם הבמאי/ת" />
      </div>

      <div class="pf-field">
        <label>6. מספר תכניות שצולמו</label>
        <input id="pf-num-shows" type="text" placeholder="לדוגמה: 3" />
      </div>

      <div class="pf-field">
        <label>7. לוקיישן</label>
        <input id="pf-location" type="text" placeholder="מיקום הצילום" />
      </div>

      <div class="pf-field">
        <label>8. הגשה / הנחיה</label>
        <input id="pf-host" type="text" placeholder="שם המגיש/ה" />
      </div>

      <div class="pf-field">
        <label>9. צלמים</label>
        <input id="pf-camera" type="text" placeholder="שמות הצלמים" />
      </div>

      <div class="pf-field">
        <label>10. סוג</label>
        <select id="pf-type">
          <option value="">בחר סוג...</option>
          <option>כתבה</option>
          <option>צילום</option>
          <option>VTR</option>

      <div class="pf-field">
        <label>11. סאונד</label>
        <input id="pf-sound" type="text" placeholder="איש הסאונד" />

          <option>לא</option>
          <option>חלקית</option>

      </div>

function showSync(st){

  el.className="sync "+st; el.textContent=st==="saving"?"שומר...":"✓ נשמר";
}
let toastT;
function toast(m){
  const el=document.getElementById("toast");el.textContent=m;el.classList.add("show");
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("show"),2200);
}
function fmtDate(d,t){
  if(!d)return""; const[y,m,day]=d.split("-");
  return t?`${day}/${m}/${y} | ${t}`:`${day}/${m}/${y}`;
}

// Auto-move aired
function checkAired(){
  const now=new Date();
  const move=[];
  // from onair schedule
  S.onair.forEach(prog=>{
    const keep=[];
    prog.episodes.forEach(ep=>{
      if(!ep.airDate){keep.push(ep);return;}
      const dt=new Date(ep.airDate+(ep.airTime?"T"+ep.airTime:"T00:00"));
      if(dt<=now)move.push({progName:prog.progName,epLabel:ep.epLabel,airDate:ep.airDate,airTime:ep.airTime});
      else keep.push(ep);
    });
    prog.episodes=keep;
  });
  S.onair=S.onair.filter(p=>p.episodes.length>0);
  if(move.length){S.aired.push(...move);save();render();toast(`📺 ${move.length} פרק/ים עברו ל"שודר"`);}
}

function editSecTitle(si,pencilBtn){
  const sec=S.db.sections[si];

  const orig=titleSpan.textContent;
  const iconPart=sec.icon+" ";
  const cur=sec.title;
  titleSpan.style.display="none";
  pencilBtn.style.display="none";
  const inp=document.createElement("input");
  inp.className="title-input";inp.value=cur;
  pencilBtn.parentElement.insertBefore(inp,pencilBtn);
  inp.focus();inp.select();
  const done=()=>{
    const val=inp.value.trim();
    if(val)S.db.sections[si].title=val;
    save();render();
  };
  inp.onblur=done;
  inp.onkeydown=e=>{if(e.key==="Enter"||e.key==="Escape")inp.blur();};
}

function moveToPost(secId,rowId){
  let sec,row,rowIdx=-1;
  for(const s of S.db.sections){
    if(s.id!==secId)continue; sec=s;
    for(let j=0;j<s.rows.length;j++){
      if(String(s.rows[j].id)===String(rowId)){row=s.rows[j];rowIdx=j;break;}
    }break;
  }
  if(!row)return;

  // Check: form must be filled
  const hasForm=!!(row._prodForm);
  if(!hasForm){
    const goFill=confirm(`⚠️ טרם מולא טופס לתוכנית "${row.name}".\n\nלא ניתן להעביר לפוסט ללא טופס.\n\nלחץ אישור כדי למלא עכשיו.`);
    if(goFill){const si=S.db.sections.findIndex(s=>s.id===secId);openProdForm(si,row.id);}
    return;
  }

  // Ask WHICH episodes (free text: "1, 2, 5-7")
  const ans=prompt(
    `איזה פרקים לשלוח לפוסט?\n(לדוגמה: 1, 2, 5-7 או "פרק בוחן" או 1-13)`,
    row.filmed||""
  );
  if(ans===null||ans.trim()==="")return;

  // Parse episode list from text
  const eps=parseEpisodes(ans, row.name);
  if(!eps.length){alert("לא הצלחתי לפרסר פרקים מהקלט. נסה שוב.");return;}

  S.post.push({
    uid:String(row.id)+"_"+Date.now(),
    name:row.name,
    fromSec:secId,
    rowId:String(row.id),
    episodes:eps,
    prodForm:row._prodForm||null,
    plannedAirDate:row._plannedAirDate||"",
  });

  // ── עדכון כמויות בטבלת בהפקה ──
  const n=eps.length;
  const curFilmed=parseInt(row.filmed)||0;
  const curRemaining=row.remaining;
  const remNum=parseInt(curRemaining);
  row.filmed=String(curFilmed+n);
  if(!isNaN(remNum)&&remNum>=0){
    row.remaining=String(Math.max(0,remNum-n));
  }

  // ── איפוס הטופס לסבב הבא ──
  delete row._prodForm;

  // Row stays in בהפקה — removed only on ✓ סיום
  S.activeTab=3;save();render();
  toast(`✂️ ${n} פרקים של "${row.name}" נשלחו לפוסט`);
}

function finishProd(secId,rowId){
  let sec,row,rowIdx=-1;
  for(const s of S.db.sections){
    if(s.id!==secId)continue; sec=s;
    for(let j=0;j<s.rows.length;j++){
      if(String(s.rows[j].id)===String(rowId)){row=s.rows[j];rowIdx=j;break;}
    }break;
  }
  if(!row)return;
  if(!confirm(`לסיים את ההפקה של "${row.name}"?\nהתכנית תועבר ללשונית "שודר".`))return;
  S.aired.push({progName:row.name,epLabel:row.name,airDate:"",airTime:"",fromProduction:true});
  sec.rows.splice(rowIdx,1);
  save();render();
  toast(`✓ "${row.name}" הועברה לשודר`);
}

// Parse "1, 2, 5-7" or "פרק בוחן" → array of episode objects
function parseEpisodes(input, progName){
  const eps=[];
  // Split by comma or semicolon
  const parts=input.split(/[,;]+/).map(s=>s.trim()).filter(Boolean);
  parts.forEach(part=>{
    // Range: 5-7
    const range=/^(\d+)\s*[-–]\s*(\d+)$/.exec(part);
    if(range){
      const from=parseInt(range[1]),to=parseInt(range[2]);
      for(let n=from;n<=to;n++)
        eps.push(mkEp(progName,"פרק "+n,n));
      return;
    }
    // Single number
    const num=/^(\d+)$/.exec(part);
    if(num){
      const n=parseInt(num[1]);
      eps.push(mkEp(progName,"פרק "+n,n));
      return;
    }
    // Free text (e.g. "פרק בוחן", "פיילוט")
    eps.push(mkEp(progName,part,null));
  });
  return eps;
}
function mkEp(progName,label,num){
  return{num,progName,epLabel:progName+" — "+label,
         stages:Array(7).fill(false),ozDate:"",airDate:"",airTime:""};
}

function togStage(pi,ei,si){
  const ep=S.post[pi].episodes[ei];
  if(!ep.stages)ep.stages=Array(7).fill(false);
  ep.stages[si]=!ep.stages[si];
  // Auto-send to OnAir when ALL 7 stages done AND ozDate filled
  if(ep.stages.every(Boolean)&&ep.ozDate){
    autoSendEpAir(pi,ei);
    return;
  }
  save();render();
}

function autoSendEpAir(pi,ei){
  const prog=S.post[pi];const ep=prog.episodes[ei];
  let oa=S.onair.find(p=>p.progName===ep.progName);
  if(!oa){oa={progName:ep.progName,episodes:[]};S.onair.push(oa);}
  // Pass the air date/time filled in post, plus the oz sent date
  oa.episodes.push({
    epLabel:  ep.epLabel,
    airDate:  ep.epDate||"",   // תאריך עלייה לשידור שמולא בפוסט
    airTime:  ep.epTime||"",   // שעת עלייה לשידור שמולאה בפוסט
    ozDate:   ep.ozDate||"",   // תאריך שנשלח לעוז
  });
  prog.episodes.splice(ei,1);
  if(prog.episodes.length===0)S.post.splice(pi,1);
  save();render();
  toast(`✅ "${ep.epLabel}" הושלם ועבר לשידור אוטומטית!`);
}

function updEpDate(pi,ei,k,v){
  S.post[pi].episodes[ei][k]=v;
  // Check auto-send after setting ozDate
  const ep=S.post[pi]&&S.post[pi].episodes[ei];
  if(ep&&ep.stages&&ep.stages.every(Boolean)&&ep.ozDate){
    autoSendEpAir(pi,ei);return;
  }
  save();render();
}

  // Button to add a new program manually
  html+=`<div style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-add" onclick="addOnAirProg()">+ הוסף תוכנית</button>
  </div>`;

  if(!S.onair.length)return html+`<div class="empty">הוסיפי תוכנית ופרקים עם תאריכי שידור</div>`;

  const now=new Date();
  S.onair.forEach((prog,pi)=>{
    const isOpen=S.onairCollapsed[pi]!==true;
    // Sort eps by date
    const sorted=[...prog.episodes].map((ep,i)=>({...ep,i})).sort((a,b)=>{
      if(!a.airDate&&!b.airDate)return 0;if(!a.airDate)return 1;if(!b.airDate)return -1;
      return(a.airDate+(a.airTime?"T"+a.airTime:"T00:00")).localeCompare(b.airDate+(b.airTime?"T"+b.airTime:"T00:00"));
    });
    const pastCount=sorted.filter(ep=>{
      if(!ep.airDate)return false;
      return new Date(ep.airDate+(ep.airTime?"T"+ep.airTime:"T00:00"))<=now;
    }).length;

    html+=`<div class="sec-box">
      <div class="ch purple-h" onclick="togOnAir(${pi})">
        <div class="purple-t">📺 ${prog.progName}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11;color:rgba(175,169,236,.5)">${pastCount}/${prog.episodes.length} שודר</span>
          <button class="btn btn-ghost" onclick="event.stopPropagation();addOnAirEp(${pi})">+ פרק</button>
          <button class="btn btn-del" onclick="event.stopPropagation();delOnAirProg(${pi})">✕</button>
          <span class="arr">${isOpen?"▲":"▼"}</span>
        </div>
      </div>`;
    if(isOpen){
      html+=`<div class="cb purple-b">`;
      if(!prog.episodes.length)html+=`<div class="empty" style="padding:16px">לחץ "+ פרק" להוספת פרק</div>`;
      sorted.forEach(ep=>{
        const idx=ep.i;
        let isPast=false,isWeek=false,isDay=false;
        if(ep.airDate){
          const dt=new Date(ep.airDate+(ep.airTime?"T"+ep.airTime:"T00:00"));
          const diff=(dt-now)/(1000*60*60*24); // days
          isPast=dt<=now;
          isDay=!isPast&&diff<=1;
          isWeek=!isPast&&!isDay&&diff<=7;
        }
        const rowBg=isDay?"rgba(239,68,68,.12)":isWeek?"rgba(251,213,0,.08)":"";
        const rowBorder=isDay?"rgba(239,68,68,.35)":isWeek?"rgba(251,213,0,.3)":"rgba(255,255,255,.04)";
        const urgencyTag=isDay?`<span style="font-size:10;color:#F87171;font-weight:700">⚠️ מחר!</span>`
          :isWeek?`<span style="font-size:10;color:#FDE047;font-weight:700">⏰ עוד שבוע</span>`:"";
        html+=`<div class="cr" style="background:${rowBg};border-right:3px solid ${rowBorder};${isPast?"opacity:.45":""}">
          <div class="dot ${isPast?"dgray":isDay?"dot-red":isWeek?"dot-yellow":"dp"}"></div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:13;display:flex;align-items:center;gap:6px">
              ${ep.epLabel} ${urgencyTag}
            </div>
            ${ep.airDate?`<div style="font-size:11;margin-top:2px;color:${isPast?"#666":isDay?"rgba(248,113,113,.8)":isWeek?"rgba(253,224,71,.8)":"rgba(175,169,236,.6)"}">
              ${isPast?"✓ שודר ":"🕐 "}${fmtDate(ep.airDate,ep.airTime)}</div>`:""}
          </div>
          <input type="date" value="${ep.airDate||""}" onchange="updOnAirEp(${pi},${idx},'airDate',this.value)" />
          <input type="time" value="${ep.airTime||""}" onchange="updOnAirEp(${pi},${idx},'airTime',this.value)" />
          <button class="btn btn-del" onclick="delOnAirEp(${pi},${idx})">✕</button>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  return html;
}

function addOnAirProg(){

function addOnAirEp(pi){

// ── Hebrew calendar data for 2026 ──────────────────────────
// Month starts: [dateKey, hebMonthName, yearStr]
const HEB_MONTH_STARTS=[
  ["2026-01-01","טבת",'תשפ"ו'],  // 2 Tevet (1 Jan = 2 Tevet)
  ["2026-01-19","שבט",'תשפ"ו'],
  ["2026-02-18","אדר",'תשפ"ו'],
  ["2026-03-19","ניסן",'תשפ"ו'],

  ["2026-09-12","תשרי",'תשפ"ז'],
  ["2026-10-12","חשון",'תשפ"ז'],
  ["2026-11-11","כסלו",'תשפ"ז'],
  ["2026-12-11","טבת",'תשפ"ז'],
];
// Corrections for start of year (Jan 1 = 2 Tevet, so offset needed)
const HEB_JAN_TEVET_START_DAY=2; // 1 Jan 2026 = 2 Tevet

const HEB_NUM=["","א","ב","ג","ד","ה","ו","ז","ח","ט","י","י\"א","י\"ב","י\"ג","י\"ד","ט\"ו","ט\"ז","י\"ז","י\"ח","י\"ט","כ","כ\"א","כ\"ב","כ\"ג","כ\"ד","כ\"ה","כ\"ו","כ\"ז","כ\"ח","כ\"ט","ל"];

function getHebDate(dateKey){
  const d=new Date(dateKey+"T12:00:00");
  // Find which Hebrew month we're in
  let mIdx=0;
  for(let i=0;i<HEB_MONTH_STARTS.length-1;i++){
    if(dateKey>=HEB_MONTH_STARTS[i][0]&&dateKey<HEB_MONTH_STARTS[i+1][0]){mIdx=i;break;}
    if(i===HEB_MONTH_STARTS.length-2)mIdx=HEB_MONTH_STARTS.length-1;
  }
  const ms=HEB_MONTH_STARTS[mIdx];
  const mStart=new Date(ms[0]+"T12:00:00");
  let dayNum;
  if(mIdx===0){
    // Jan 1 = 2 Tevet, special offset
    const diff=Math.round((d-mStart)/86400000);
    dayNum=HEB_JAN_TEVET_START_DAY+diff;
  } else {
    dayNum=Math.round((d-mStart)/86400000)+1;
  }
  const dayStr=HEB_NUM[dayNum]||String(dayNum);
  return{day:dayStr,month:ms[1],year:ms[2]};
}

function renderDiary(){
  const y=S.calYear, m=S.calMonth;
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();
  const todayKey=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  let html=hero("📓","יומן הפקה","לחץ על יום להוספת אירוע");

  html+=`<div class="cal-nav">
    <button class="cal-nav-btn" onclick="calPrev()">→ חודש קודם</button>
    <div class="cal-month-title">${HEB_MONTHS[m]} ${y}</div>
    <button class="cal-nav-btn" onclick="calNext()">חודש הבא ←</button>
  </div>`;

  html+=`<div class="cal-grid">`;
  HEB_DAYS.forEach(d=>html+=`<div class="cal-dow">${d}</div>`);

  for(let i=0;i<firstDay;i++) html+=`<div></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const dateKey=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isToday=dateKey===todayKey;
    const events=S.calEvents[dateKey]||[];
    const holiday=HOLIDAYS[dateKey]||"";
    const parsha=PARSHIYOT[dateKey]||"";
    const isShabat=new Date(dateKey+"T12:00:00").getDay()===6;

    // Hebrew date
    const hd=getHebDate(dateKey);

    html+=`<div class="cal-day${isToday?" today":""}${holiday?" has-holiday":""}${isShabat?" shabat":""}"
      onclick="openEvPopup('${dateKey}',null)">
      <div class="cal-day-num">${d}</div>
      <div class="cal-heb-date">${hd.day} ${hd.month}</div>
      ${holiday?`<div class="cal-holiday">${holiday}</div>`:""}
      ${parsha&&isShabat?`<div class="cal-parsha">פ׳ ${parsha}</div>`:""}`;
    events.forEach((ev,ei)=>{
      html+=`<div class="cal-event" onclick="event.stopPropagation();openEvPopup('${dateKey}',${ei})"
        title="${ev.topic}${ev.location?' | '+ev.location:''}">
        ${ev.start?ev.start+" ":""}${ev.topic}</div>`;
    });
    html+=`<div class="cal-add-btn" onclick="event.stopPropagation();openEvPopup('${dateKey}',null)">+</div>
    </div>`;
  }
  html+=`</div>`;
  return html;
}

function calPrev(){
  S.calMonth--;
  if(S.calMonth<0){S.calMonth=11;S.calYear--;}
  save();render();
}
function calNext(){
  S.calMonth++;
  if(S.calMonth>11){S.calMonth=0;S.calYear++;}
  save();render();
}

// Event popup
let evTarget={dateKey:null,evIdx:null};

function openEvPopup(dateKey,evIdx){
  evTarget={dateKey,evIdx};
  const [y,m,d]=dateKey.split("-");
  const heb=`${parseInt(d)} ${HEB_MONTHS[parseInt(m)-1]} ${y}`;
  document.getElementById("ev-date-lbl").textContent=heb;

  const ev=(evIdx!==null)?(S.calEvents[dateKey]||[])[evIdx]:null;
  document.getElementById("ev-popup-title").textContent=ev?"✏️ עריכת אירוע":"➕ הוסף אירוע";
  document.getElementById("ev-topic").value=ev?ev.topic:"";
  document.getElementById("ev-location").value=ev?ev.location:"";
  document.getElementById("ev-start").value=ev?ev.start:"";
  document.getElementById("ev-end").value=ev?ev.end:"";
  document.getElementById("ev-notes").value=ev?ev.notes:"";
  document.getElementById("ev-del-btn").style.display=ev?"inline-flex":"none";
  document.getElementById("ev-overlay").classList.add("open");
  setTimeout(()=>document.getElementById("ev-topic").focus(),80);
}
function closeEvPopup(){
  document.getElementById("ev-overlay").classList.remove("open");
  evTarget={dateKey:null,evIdx:null};
}
document.getElementById("ev-overlay").addEventListener("click",function(e){
  if(e.target===this)closeEvPopup();
});

function saveEvent(){
  const{dateKey,evIdx}=evTarget;if(!dateKey)return;
  const topic=document.getElementById("ev-topic").value.trim();
  if(!topic){alert("חובה למלא נושא");return;}
  const ev={
    topic,
    location:document.getElementById("ev-location").value.trim(),
    start:   document.getElementById("ev-start").value,
    end:     document.getElementById("ev-end").value,
    notes:   document.getElementById("ev-notes").value.trim(),
  };
  if(!S.calEvents[dateKey])S.calEvents[dateKey]=[];
  if(evIdx!==null) S.calEvents[dateKey][evIdx]=ev;
  else S.calEvents[dateKey].push(ev);
  save();render();closeEvPopup();
  toast("✓ אירוע נשמר");
}

function deleteEvent(){
  const{dateKey,evIdx}=evTarget;
  if(!dateKey||evIdx===null)return;
  if(!confirm("למחוק אירוע זה?"))return;
  S.calEvents[dateKey].splice(evIdx,1);
  if(!S.calEvents[dateKey].length)delete S.calEvents[dateKey];
  save();render();closeEvPopup();
  toast("🗑 אירוע נמחק");
}
